name: e_commerce_admin
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.6.0
  google_sign_in: ^7.2.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  get: ^4.6.5
  firebase_storage: ^13.2.0
  image_picker: ^1.2.1
  device_info_plus: ^12.3.0
  permission_handler: ^12.0.1
  flutter_easyloading: ^3.0.5
  uuid: ^4.5.3
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^20.0.0
  flutter_swipe_action_cell: ^3.1.6
  cached_network_image: ^3.4.1
  flutter_keyboard_visibility: ^6.0.0
  syncfusion_flutter_charts: ^31.1.19
  shimmer: ^3.0.0
  iconsax: ^0.0.8
  geolocator: ^14.0.2
  google_maps_flutter: ^2.14.0
  flutter_polyline_points: ^3.1.0
  url_launcher: ^6.3.2
  geocoding: ^4.0.0
  change_app_package_name: ^1.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # Package moved here for best practices
  flutter_launcher_icons: ^0.13.1

# 🔥 LOGO CONFIGURATION BLOCK
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_logo.png"
  adaptive_icon_background: "#101010"
  adaptive_icon_foreground: "assets/app_logo.png"

flutter:
  uses-material-design: true

  # 🔥 ASSETS ENABLED HERE
  assets:
    - assets/